<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧅 [DIR] /hidden/relay_node_7</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41; /* Classic Matrix/Terminal Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Matrix Rain Canvas */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.15;
        }

        #login-container {
            position: relative;
            z-index: 1;
            border: 2px solid #00ff41;
            padding: 30px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 15px #00ff41;
            text-align: center;
            max-width: 450px;
        }

        .glitch {
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0.05em 0 0 #00ff41, -0.025em -0.05em 0 #ff00c1,
                         0.025em 0.05em 0 #fffc00;
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #00ff41, -0.05em -0.025em 0 #ff00c1; }
            15% { text-shadow: -0.05em -0.025em 0 #00ff41, 0.025em 0.025em 0 #ff00c1; }
            49% { text-shadow: -0.05em -0.025em 0 #00ff41, 0.025em 0.025em 0 #ff00c1; }
            50% { text-shadow: 0.025em 0.05em 0 #00ff41, 0.05em 0 0 #ff00c1; }
            99% { text-shadow: 0.025em 0.05em 0 #00ff41, 0.05em 0 0 #ff00c1; }
            100% { text-shadow: -0.025em 0 0 #00ff41, -0.025em -0.025em 0 #ff00c1; }
        }

        .warning-banner {
            background-color: #00ff41;
            color: black;
            font-weight: bold;
            padding: 5px;
            margin-bottom: 20px;
            font-size: 0.7rem;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            width: 90%;
            text-align: center;
            font-size: 1.5rem;
            outline: none;
            margin-top: 20px;
            letter-spacing: 5px;
        }

        button {
            background: transparent;
            color: #00ff41;
            border: 1px solid #00ff41;
            padding: 10px 30px;
            margin-top: 30px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }

        button:hover {
            background: #00ff41;
            color: black;
            box-shadow: 0 0 20px #00ff41;
        }

        #error-msg {
            color: #ff0000;
            font-size: 0.8rem;
            margin-top: 20px;
            display: none;
            text-shadow: 0 0 5px red;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="login-container">

    <div class="glitch">ENCRYPTED_GATEWAY</div>
    <p style="font-size: 0.7rem; margin-top: 10px;">AUTHORIZED SPHYNX ACCESS ONLY</p>

    <input type="text" id="node-id" placeholder="ID-NUMBER" maxlength="11">
    <br>
    <button onclick="checkAccess()">ESTABLISH TUNNEL</button>

    <div id="error-msg">>> CRITICAL_ERROR: ID NOT RECOGNIZED.<br>>> ALERT SENT TO NODE_WARSAW.</div>
</div>

<script>
    // Matrix Background Effect
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px arial";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 33);

    // Access Logic
    function checkAccess() {
        const input = document.getElementById('node-id').value;
        const error = document.getElementById('error-msg');

        const secretID = "80443139445"; // CHANGE THIS
        const redirectURL = "index.html"; // CHANGE THIS

        if (input === secretID) {
            window.location.href = redirectURL;
        } else {
            error.style.display = "block";
            // Flash red effect
            document.body.style.backgroundColor = "#200";
            setTimeout(() => { document.body.style.backgroundColor = "#050505"; }, 100);
        }
    }
</script>

</body>
</html>
